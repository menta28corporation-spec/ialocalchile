  <head>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IA Local Chile",
      "url": "https://ialocalchile.cl",
      "logo": "https://ialocalchile.cl/favicon.svg",
      "description": "Agencia de Automatización B2B e Inteligencia Artificial para Pymes en Chile. Reducción de costos y aumento de ventas con bots inteligentes.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Santiago",

      },
      "contactPoint": {

      }
    }
    </script>
    <style>
      /* Animaciones y Diseño Premium */
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseGlow {
        0% { box-shadow: 0 0 0 0 rgba(79, 255, 79, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(79, 255, 79, 0); }
        100% { box-shadow: 0 0 0 0 rgba(79, 255, 79, 0); }
      }
      .animated-entrance {
        animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* Hover del Agente */
      #wa-btn {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
      }
      #wa-btn:hover {
        transform: translateY(-4px) scale(1.02) !important;
        box-shadow: 0 12px 24px rgba(153, 0, 255, 0.4) !important;
      }

      /* Live Indicator */
      .live-indicator {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 14px;
        height: 14px;
        background-color: #4FFF4F;
        border: 2px solid white;
        border-radius: 50%;
        animation: pulseGlow 2s infinite;
        z-index: 10;
      }

      /* Modo Celular (Responsive) */
      @media (max-width: 600px) {
        #wa-widget {
          bottom: 15px !important;
          right: 75px !important;
        }
        #wa-btn {
          width: 50px !important;
          height: 50px !important;
        }
        #wa-btn svg {
          width: 26px !important;
          height: 26px !important;
        }
        a[href*="wa.me"]:not(#wa-link-btn) {
          width: 50px !important;
          height: 50px !important;
          bottom: 15px !important;
          right: 15px !important;
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- BANNER PROMOCIONAL -->
    <div id="promo-banner" class="animated-entrance" style="background: linear-gradient(90deg, #FF0055, #9900FF); color: white; text-align: center; padding: 12px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px; z-index: 999999; position: fixed; top: 0; left: 0; width: 100%; box-shadow: 0 4px 15px rgba(255,0,85,0.3); opacity: 0; animation-delay: 0.2s;">
      🔥 50% DE DESCUENTO para los primeros 3 Founders o referidos 🔥 
    </div>
    
    <div id="root" style="padding-top: 48px;"></div>

    <!-- AGENTE VIRTUAL (WHATSAPP WIDGET) -->
    <!-- AGENTE VIRTUAL IA LOCAL (CHAT INTERACTIVO) -->
    <div id="wa-widget" class="animated-entrance" style="position: fixed; bottom: 25px; right: 110px; z-index: 999999; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: flex-end; opacity: 0; animation-delay: 0.4s;">
      <!-- Ventana de Chat -->
      <div id="wa-chat" style="display: none; width: 340px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); overflow: hidden; margin-bottom: 20px; transition: all 0.3s ease; display: flex; flex-direction: column; height: 450px;">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #128C7E, #25D366); color: white; padding: 16px; font-weight: 600; font-size: 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 10px; height: 10px; background: #4FFF4F; border-radius: 50%; box-shadow: 0 0 5px #4FFF4F;"></div>
            Agente Virtual IA Local
          </div>
          <span onclick="document.getElementById('wa-chat').style.display='none'" style="cursor: pointer; font-size: 18px; opacity: 0.8;">✕</span>
        </div>
        
        <!-- Mensajes -->
        <div id="chat-messages" style="flex-grow: 1; padding: 15px; overflow-y: auto; background: #F8F9FA; display: flex; flex-direction: column; gap: 10px; font-size: 14.5px; color: #444; line-height: 1.5;">
          <div style="align-self: flex-start; background: white; border: 1px solid #eee; padding: 12px; border-radius: 12px; border-bottom-left-radius: 2px; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            ¡Hola! 👋 Soy el Agente Virtual de <strong>IA Local Chile</strong>.<br><br>¿En qué rubro opera tu empresa para mostrarte cómo nuestra Inteligencia Artificial puede ahorrarte tiempo y escalar tus ventas?
          </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 12px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0;">
          <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." style="flex-grow: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-family: inherit; font-size: 14px;" onkeypress="if(event.key === 'Enter') enviarMensaje()">
          <button onclick="enviarMensaje()" style="background: #25D366; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        
        <!-- Botón de WhatsApp Oculto (Aparece cuando hay spam/cierre) -->
        <a id="wa-link-btn" href="https://wa.me/?text=Hola,%20quiero%20conocer%20m%C3%A1s%20sobre%20IA%20Local%20Chile%20y%20el%20descuento%20del%2050%25" target="_blank" style="display: none; text-align: center; background: #25D366; color: white; padding: 12px; margin: 0 12px 12px 12px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.4);">
          Continuar en WhatsApp 💬
        </a>
      </div>
      <!-- Botón Flotante -->
      <div id="wa-btn" onclick="document.getElementById('wa-chat').style.display='flex'; this.style.transform='scale(0.9)'; setTimeout(()=>this.style.transform='scale(1)', 150);" style="position: relative; background: linear-gradient(135deg, #9900FF, #0055FF); width: 65px; height: 65px; border-radius: 50%; box-shadow: 0 6px 16px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease;">
        <div class="live-indicator"></div>
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2"></rect>
          <circle cx="12" cy="5" r="2"></circle>
          <path d="M12 7v4"></path>
          <line x1="8" y1="16" x2="8.01" y2="16"></line>
          <line x1="16" y1="16" x2="16.01" y2="16"></line>
        </svg>
      </div>
    </div>

    <!-- SCRIPT DE MODIFICACIÓN DE DOM (PRECIOS E ICONOS) -->
    <script>
      // Función central para aplicar los cambios visuales
      const applyDOMChanges = () => {
        // 1. Modificación de Precios (Búsqueda por Nodos de Texto para evitar fallos de clases)
        const prices = [
          {old: '$149.000', new: '$74.500'},
          {old: '$289.000', new: '$144.500'},
          {old: '$449.000', new: '$224.500'},
          {old: '$149k', new: '$74.5k'}
        ];
        
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        const nodesToReplace = [];
        
        while(node = walker.nextNode()) {
          if (node.parentNode && (node.parentNode.closest('[data-discounted="true"]') || node.parentNode.tagName === 'SCRIPT' || node.parentNode.tagName === 'STYLE' || node.parentNode.closest('#wa-widget'))) {
            continue;
          }
          for (let p of prices) {
            if(node.nodeValue.includes(p.old)) {
              nodesToReplace.push({node, p});
              break;
            }
          }
        }
        
        nodesToReplace.forEach(({node, p}) => {
          const span = document.createElement('span');
          span.dataset.discounted = "true";
          span.innerHTML = node.nodeValue.replace(p.old, `<s style="font-size:0.65em; opacity:0.6; margin-right:6px;">${p.old}</s><span style="color:#FF0055; font-weight:800;">${p.new}</span>`);
          node.parentNode.replaceChild(span, node);
        });

        // 1.5. Ocultar botón "Hablemos" de la barra superior
        const btns = Array.from(document.querySelectorAll('button'));
        const hablemosBtn = btns.find(btn => btn.textContent.trim().toLowerCase() === 'hablemos');
        if (hablemosBtn) {
          hablemosBtn.style.display = 'none';
        }

        // 2. Modificación del Botón Nativo de WhatsApp (Instantáneo)
        const waNative = Array.from(document.querySelectorAll('a[href*="wa.me"]')).find(el => el.id !== 'wa-link-btn');
        if (waNative) {
          if (!waNative.dataset.iconChanged) {
            const svg = waNative.querySelector('svg');
            if(svg) {
              svg.outerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12.012 2c-5.506 0-9.989 4.478-9.99 9.984a9.964 9.964 0 001.333 4.993L2 22l5.233-1.337a9.99 9.99 0 004.779 1.206h.004c5.505 0 9.988-4.478 9.989-9.984 0-5.508-4.484-9.985-9.993-9.985zm0 18.312h-.003a8.318 8.318 0 01-4.24-1.155l-.304-.18-3.147.804.84-3.006-.197-.313A8.32 8.32 0 013.685 11.98c.001-4.582 3.738-8.315 8.33-8.315 4.588 0 8.321 3.734 8.321 8.315 0 4.585-3.736 8.332-8.324 8.332zm4.568-6.223c-.25-.125-1.482-.731-1.713-.815-.23-.083-.399-.125-.568.125-.168.25-.646.815-.791.981-.146.166-.293.187-.543.062-1.071-.537-2.072-1.055-2.852-2.164-.202-.288.203-.271.691-1.242.083-.166.042-.312-.021-.437-.063-.125-.568-1.371-.778-1.877-.204-.492-.41-.425-.568-.433-.146-.008-.313-.008-.48-.008s-.438.062-.667.312c-.23.25-.876.856-.876 2.087s.897 2.422 1.022 2.589c.125.166 1.767 2.697 4.28 3.782 1.341.579 1.956.634 2.68.531.815-.116 2.428-.992 2.766-1.952.338-.96.338-1.783.237-1.952-.101-.166-.37-.271-.62-.396z"/></svg>';
            }
            waNative.dataset.iconChanged = "true";
          }
          
          // Clonar dimensiones y posición vertical
          const rect = waNative.getBoundingClientRect();
          if (rect.height > 0) {
             const viewportHeight = window.innerHeight;
             const waBottom = viewportHeight - rect.bottom;
             document.getElementById('wa-widget').style.bottom = waBottom + "px";
             const miWidget = document.getElementById('wa-btn');
             if(miWidget) {
               miWidget.style.width = rect.width + "px";
               miWidget.style.height = rect.height + "px";
             }
          }
        }
      };

      // Ejecutar inmediatamente por si ya está renderizado
      applyDOMChanges();

      // Usar MutationObserver para capturar el renderizado exacto de React (0 milisegundos de retraso)
      const observer = new MutationObserver((mutations) => {
        applyDOMChanges();
      });
      
      observer.observe(document.body, { childList: true, subtree: true });

      // Auto-abrir el chat después de 4 segundos
      setTimeout(() => {
        document.getElementById('wa-chat').style.display = 'flex';
      }, 4000);

      // --- LOGICA DEL CHAT INTERACTIVO (CON IA LOCAL) ---
      let msgCount = 0;
      const MAX_MESSAGES = 3; // Sistema Anti-Spam / Derivador de Ventas
      const CLOUDFLARE_TUNNEL_URL = "https://spend-challenged-threatened-ireland.trycloudflare.com"; 

      async function enviarMensaje() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        // Limpiar input y sumar contador
        input.value = '';
        msgCount++;

        const chatMessages = document.getElementById('chat-messages');

        // Renderizar mensaje del usuario
        chatMessages.innerHTML += `
          <div style="align-self: flex-end; background: #E1F5FE; border: 1px solid #B3E5FC; padding: 12px; border-radius: 12px; border-bottom-right-radius: 2px; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            ${text}
          </div>
        `;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Comprobar Anti-Spam
        if (msgCount >= MAX_MESSAGES) {
          setTimeout(() => {
            chatMessages.innerHTML += `
              <div style="align-self: flex-start; background: white; border: 1px solid #eee; padding: 12px; border-radius: 12px; border-bottom-left-radius: 2px; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                Entiendo tu caso. Como esto requiere un análisis detallado para aplicar tu <strong>50% de descuento</strong>, por favor continúa la conversación directamente por WhatsApp con nuestro especialista.
              </div>
            `;
            chatMessages.scrollTop = chatMessages.scrollHeight;
            document.getElementById('wa-link-btn').style.display = 'block';
            document.getElementById('chat-input').disabled = true;
            document.getElementById('chat-input').placeholder = "Chat bloqueado por seguridad";
          }, 1000);
          return;
        }

        // Renderizar indicador de "Escribiendo..."
        const typingId = 'typing-' + Date.now();
        chatMessages.innerHTML += `
          <div id="${typingId}" style="align-self: flex-start; background: white; border: 1px solid #eee; padding: 12px; border-radius: 12px; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #888; font-style: italic;">
            Escribiendo...
          </div>
        `;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          // Aquí se hace el llamado real a Ollama con instrucción de NO usar emojis
          const response = await fetch(CLOUDFLARE_TUNNEL_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: "llama3.1",
              messages: [
                { role: "system", content: "Eres el agente virtual corporativo B2B de IA Local Chile. Tu tono es ejecutivo, profesional, directo y de negocios. REGLA 1: Saluda cordialmente. REGLA 2: NUNCA uses emojis ni emoticonos. REGLA 3: Responde con máximo 2 oraciones muy breves. REGLA 4: Si debes hacer una pregunta, haz SOLO UNA y orientada estrictamente a conocer sobre LA EMPRESA o EL NEGOCIO del cliente para ver cómo la Inteligencia Artificial puede ayudarles. JAMÁS hagas preguntas personales ni digas 'quiero conocer sobre usted'." },
                { role: "user", content: text }
              ],
              stream: false
            })
          });
          const data = await response.json();
          // API de Ollama retorna la respuesta en data.message.content
          const botResponse = data.message ? data.message.content : (data.error || "Respuesta vacía");

          document.getElementById(typingId).remove();
          chatMessages.innerHTML += `
            <div style="align-self: flex-start; background: white; border: 1px solid #eee; padding: 12px; border-radius: 12px; border-bottom-left-radius: 2px; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
              ${botResponse.replace(/\n/g, '<br>')}
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;

        } catch (error) {
          document.getElementById(typingId).remove();
          chatMessages.innerHTML += `
            <div style="align-self: flex-start; background: #FFEBEE; border: 1px solid #FFCDD2; padding: 12px; border-radius: 12px; border-bottom-left-radius: 2px; max-width: 85%;">
              Hubo un error de conexión con la red local. Por favor háblanos por WhatsApp.
            </div>
          `;
          document.getElementById('wa-link-btn').style.display = 'block';
        }
      }
    </script>
  </body>
</html>
